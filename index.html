<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PodcastApp</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter&display=swap"
      rel="stylesheet"
    />
    <script type="module" defer src="./src/index.js"></script>
  </head>
  <body>
    <header class="app-header">
      <h1 aria-label="Podcast App home">🎙️ Podcast App</h1>
    </header>

    <main id="podcastGrid" class="grid" aria-live="polite">
      <!-- Example Web Component usage -->
      <podcast-preview
        title="Tech Talks"
        cover="cover.jpg"
        genres="Technology, Innovation"
        seasons="3"
        updated="2026-05-20"
      ></podcast-preview>
    </main>

    <!-- Modal -->
    <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-content">
        <div class="title-section">
          <h2 id="modalTitle"></h2>
          <button
            class="close-btn"
            id="closeModal"
            aria-label="Close modal"
          >&times;</button>
        </div>
        <div class="banner">
          <img id="modalImage" class="modal-img" alt="Podcast cover" />
          <div class="info-section">
            <h3>Description</h3>
            <p id="modalDesc"></p>
            <h3>Genres</h3>
            <div id="modalGenres" class="tags"></div>
            <p id="modalUpdated" class="modal-updated-text"></p>
          </div>
        </div>
        <h3>Seasons</h3>
        <ul id="seasonList" class="season-list"></ul>
      </div>
    </div>
  </body>
</html>
